services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rebirth_test
      POSTGRES_USER: rebirth_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebirth_test -d rebirth_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
