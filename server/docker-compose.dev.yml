services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rebirth}
      POSTGRES_USER: ${POSTGRES_USER:-rebirth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebirth-development-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - rebirth_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    environment:
      REBIRTH_ENV: development
      REBIRTH_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rebirth}:${POSTGRES_PASSWORD:-rebirth-development-password}@postgres:5432/${POSTGRES_DB:-rebirth}
      REBIRTH_JWT_SECRET: ${REBIRTH_JWT_SECRET:-rebirth-docker-development-only-secret-change-me}
      REBIRTH_AI_PROVIDER: ${REBIRTH_AI_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REBIRTH_AI_MODEL: ${REBIRTH_AI_MODEL:-}
      REBIRTH_AI_TIMEOUT_SECONDS: ${REBIRTH_AI_TIMEOUT_SECONDS:-90}
      REBIRTH_AI_MAX_OUTPUT_TOKENS: ${REBIRTH_AI_MAX_OUTPUT_TOKENS:-1600}
      REBIRTH_AI_FAKE_SCENARIO: ${REBIRTH_AI_FAKE_SCENARIO:-success}
      REBIRTH_AI_RESULT_RETENTION_HOURS: ${REBIRTH_AI_RESULT_RETENTION_HOURS:-24}
      REBIRTH_AI_DEDUPE_RETENTION_DAYS: ${REBIRTH_AI_DEDUPE_RETENTION_DAYS:-30}
      REBIRTH_AI_PROCESSING_LEASE_MINUTES: ${REBIRTH_AI_PROCESSING_LEASE_MINUTES:-5}
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  rebirth_postgres_data:
