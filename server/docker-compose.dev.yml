services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rebirth}
      POSTGRES_USER: ${POSTGRES_USER:-rebirth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rebirth-development-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - rebirth_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
    environment:
      REBIRTH_ENV: development
      REBIRTH_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rebirth}:${POSTGRES_PASSWORD:-rebirth-development-password}@postgres:5432/${POSTGRES_DB:-rebirth}
      REBIRTH_JWT_SECRET: ${REBIRTH_JWT_SECRET:-rebirth-docker-development-only-secret-change-me}
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  rebirth_postgres_data:

