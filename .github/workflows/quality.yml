name: Quality

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  server-sqlite:
    name: Server SQLite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -m "not postgres"

  server-postgresql:
    name: Server PostgreSQL Multiprocess And Multiworker
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rebirth_test
          POSTGRES_USER: rebirth_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rebirth_test -d rebirth_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      REBIRTH_ENV: test
      REBIRTH_DATABASE_URL: postgresql+psycopg://rebirth_test@127.0.0.1:5432/rebirth_test
      REBIRTH_POSTGRES_TEST_URL: postgresql+psycopg://rebirth_test@127.0.0.1:5432/rebirth_test
      REBIRTH_JWT_SECRET: github-actions-test-only-secret
      REBIRTH_AI_PROVIDER: fake
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m alembic upgrade head
      - run: python -m pytest -m postgres
      - run: python scripts/verify_ai_multiworker.py --workers 2

  flutter:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  android-debug:
    name: Android Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
